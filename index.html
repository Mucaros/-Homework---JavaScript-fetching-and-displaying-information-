<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Meal & Cocktail Matcher</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Meal and cocktail matching</h1>
    <p id="loading">Loading...</p>
    <div class="container">
      <div id="meal-container" class="meal">Random meal info goes here</div>
      <div id="cocktail-container" class="cocktail">Matched or random cocktail info goes here</div>
    </div>
    <button onclick="init()">Get a new match</button>

    <script src="script.js"></script>
  </body>
</html>
